[phases.setup]
nixPkgs = [
  "php82",
  "php82Extensions.pdo_sqlsrv",
  "php82Extensions.sqlsrv",
  "php82Packages.composer",
  "nodejs_22"
]

[phases.install]
cmds = [
  "composer install --no-interaction --prefer-dist --optimize-autoloader",
  "npm install"
]

[phases.build]
cmds = [
  "npm run build"
]

[start]
cmd = "php artisan serve --host=0.0.0.0 --port=${PORT}"