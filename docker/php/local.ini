; Core PHP settings
memory_limit = 512M
upload_max_filesize = 100M
post_max_size = 100M
max_execution_time = 600
display_errors = Off
log_errors = On

; Ekstensi yang dibutuhkan Laravel (sudah di-enable di Dockerfile, tapi ini untuk memastikan)
extension=sqlsrv.so
extension=pdo_sqlsrv.so

; Optimasi OpCache (Sangat disarankan untuk Production)
opcache.enable=1
opcache.memory_consumption=256
opcache.interned_strings_buffer=16
opcache.max_accelerated_files=20000
opcache.revalidate_freq=0
opcache.validate_timestamps=1